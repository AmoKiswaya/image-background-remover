<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"> 
    <title>Background Remover</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Background Remover</h1>

    <div class="card">
      <form id="upload-form" method="post" enctype="multipart/form-data">
        <div class="upload-area" id="upload-area">
            <input type="file" id="imageInput" accept="image/png, image/jpg, image/jpeg"/>
            <div class="upload-icon">📸</div>
            <div class="upload-text" id="upload-text">Choose an Image</div>
            <div class="upload-hint">PNG, JPG, or WEBP</div>
        </div> 

        <button id="removeBtn">Remove Background</button>
      </form>
    </div>

    <div class="result">
      <img id="resultImage" />
    </div>

    <a id="downloadLink" download>Download Image</a>

    <script src="app.js"></script>
  </body>
</html>
